[build]
functions = "netlify/functions"
edge_functions = "netlify/edge-functions"
publish = "."

[functions."macro-synthesis"]
  schedule = "0 13 * * 1-5"

[functions."learning-agent"]
  schedule = "0 0 * * 0"

[functions."app-enhance"]
  schedule = "0 11 1-7 * 1"

[functions."evaluate-signal-outcomes"]
  schedule = "0,30 14-21 * * 1-5"

[functions."update-agent-weights"]
  schedule = "0 10 * * 2-6"

[functions."generate-daily-report"]
  schedule = "5 21 * * 1-5"

[[redirects]]
  from = "/apex-platform"
  to = "/apex-platform.html"
  status = 200

# Route `/app` to the trading terminal. Kept as a rewrite (status 200)
# rather than a redirect so the URL stays clean (/app, not /apex-platform.html).
[[redirects]]
  from = "/app"
  to = "/apex-platform.html"
  status = 200

# Legacy URL support. Some users may have bookmarked the old URL; keep
# it working so those bookmarks don't 404.
[[redirects]]
  from = "/apex-platform.html"
  to = "/apex-platform.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

[[redirects]]
  from = "/features"
  to = "/features.html"
  status = 200

[[redirects]]
  from = "/market-preview"
  to = "/market-preview.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog/index.html"
  status = 200

[[redirects]]
  from = "/blog/:slug"
  to = "/blog/:slug.html"
  status = 200

[[redirects]]
  from = "/compare/:slug"
  to = "/compare/:slug.html"
  status = 200

[[redirects]]
  from = "/use-cases/:slug"
  to = "/use-cases/:slug.html"
  status = 200

[[redirects]]
  from = "/legal/disclaimer"
  to = "/legal/disclaimer.html"
  status = 200

[[redirects]]
  from = "/legal/risk-disclosure"
  to = "/legal/risk-disclosure.html"
  status = 200

[[redirects]]
  from = "/legal/terms"
  to = "/legal/terms.html"
  status = 200

[[redirects]]
  from = "/legal/privacy"
  to = "/legal/privacy.html"
  status = 200

[[redirects]]
  from = "/favicon.ico"
  to = "/og-image.png"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"[build]
