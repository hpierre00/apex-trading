[build]
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"
  publish = "."

[[redirects]]
  from = "/apex-platform"
  to = "/apex-platform.html"
  status = 200

# Route `/app` to the trading terminal. Kept as a rewrite (status 200)
# rather than a redirect so the URL stays clean (/app, not /apex-platform.html).
[[redirects]]
  from = "/app"
  to = "/apex-platform.html"
  status = 200

# Legacy URL support. Some users may have bookmarked the old URL; keep
# it working so those bookmarks don't 404.
[[redirects]]
  from = "/apex-platform.html"
  to = "/apex-platform.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

[[redirects]]
  from = "/features"
  to = "/features.html"
  status = 200

[[redirects]]
  from = "/market-preview"
  to = "/market-preview.html"
  status = 200

[[redirects]]
  from = "/favicon.ico"
  to = "/og-image.png"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
