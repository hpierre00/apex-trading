[build]
  functions = "netlify/functions"
  publish = "."

[[redirects]]
  from = "/"
  to = "/apex-platform.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
