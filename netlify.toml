# ===== FAVICON =====
[[redirects]]
  from = "/favicon.ico"
  to = "/og-image.png"
  status = 200

# ===== CATCH-ALL: custom 404 =====
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# ===== SECURITY HEADERS =====
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ===== EDGE FUNCTION: inject shared nav/footer =====
[[edge_functions]]
  path = "/*"
  function = "inject-chrome"
