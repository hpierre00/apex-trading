[build]
  functions = "netlify/functions"
  publish = "."

# ===== SCHEDULED FUNCTIONS =====
[functions."macro-synthesis"]
  schedule = "0 13 * * 1-5"

[functions."learning-agent"]
  schedule = "0 0 * * 0"

[functions."app-enhance"]
  schedule = "0 11 1-7 * 1"

[functions."evaluate-signal-outcomes"]
  schedule = "0,30 14-21 * * 1-5"

[functions."update-agent-weights"]
  schedule = "0 10 * * 2-6"

[functions."generate-daily-report"]
  schedule = "5 21 * * 1-5"

[functions."check-alerts"]
  schedule = "*/5 14-21 * * 1-5"

# ===== CORE APP ROUTES =====
[functions."site-monitor"]
  schedule = "*/15 * * * *"

[[redirects]]
  from = "/app"
  to = "/apex-platform.html"
  status = 200

[[redirects]]
  from = "/apex-platform"
  to = "/apex-platform.html"
  status = 200

